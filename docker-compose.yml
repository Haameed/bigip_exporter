services:
  f5_bigip_exporter:
    build: .
    image: ghcr.io/haameed/f5_bigip_exporter:latest
    container_name: f5_bigip_exporter
    restart: unless-stopped
    ports:
      - "11000:11000"
    volumes:
      - ./bigip-config.yaml:/etc/f5_bigip_exporter/bigip-config.yaml:ro
    command:
      - "-config"
      - "/etc/f5_bigip_exporter/bigip-config.yaml"
      - "-insecure"   # remove this if your BIG-IP uses trusted certs
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring
    depends_on:
      - f5_bigip_exporter

networks:
  monitoring:
    driver: bridge
