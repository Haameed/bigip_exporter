services:
  bigip_exporter:
    build: .
    image: bigip_exporter:latest
    container_name: bigip_exporter
    restart: unless-stopped
    ports:
      - "9142:9142"
    volumes:
      - ./bigip-config.yaml:/etc/bigip_exporter/bigip-config.yaml:ro
    command:
      - "-config"
      - "/etc/bigip_exporter/bigip-config.yaml"
      - "-insecure"   # remove this if your BIG-IP uses trusted certs
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring
    depends_on:
      - bigip_exporter

networks:
  monitoring:
    driver: bridge
